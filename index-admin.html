<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAERS PROTOCOL // MODULES</title>
    <link href="font/base/fonts.css" rel="stylesheet">
    <style>
        :root {
            /* 与 sq-du 战斗模块保持一致的色系 */
            --bg-base: #050505;
            --panel-bg: rgba(10, 10, 12, 0.85);
            --border: rgba(60, 65, 75, 0.6);
            --border-hover: rgba(150, 155, 165, 0.8);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent: #f59e0b; /* 炽黄色 */
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 极简网格背景 */
            background-image: 
                linear-gradient(rgba(60, 65, 75, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(60, 65, 75, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px;
        }

        header {
            margin-bottom: 60px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            font-weight: 500;
            color: #fff;
            display: flex;
            align-items: center;
        }

        .switch-btn {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: all 0.2s;
            font-family: 'Noto Sans SC', sans-serif;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .switch-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .sys-info {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            font-family: monospace;
            padding-bottom: 8px;
            line-height: 1.5;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 40px;
        }

        .module-card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        .module-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
        }

        /* 侧边强调线 */
        .module-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 3px; height: 100%;
            background: var(--border);
            transition: 0.3s;
            z-index: 2;
        }

        .module-card:hover::before {
            background: var(--accent);
        }

        .card-cover {
            width: 100%;
            height: 220px;
            background: #000;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .module-card:hover .card-cover img {
            transform: scale(1.08);
        }

        .card-body {
            padding: 24px 30px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .status-active {
            color: var(--accent);
            font-weight: bold;
        }

        .status-offline {
            color: var(--text-muted);
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.75rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed var(--border);
            padding-top: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .launch-btn {
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .module-card:hover .launch-btn {
            color: var(--accent);
        }

        /* ─── 卡片管理按鈕浮层 ─── */
        .card-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .module-card:hover .card-controls {
            opacity: 1;
        }
        .ctrl-btn {
            background: rgba(5, 5, 5, 0.85);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .ctrl-btn:hover { color: var(--text-main); border-color: var(--border-hover); }
        .ctrl-btn.del:hover { color: #ef4444; border-color: #ef4444; }

        .manual-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 32px;
            height: 32px;
            background: rgba(8, 8, 10, 0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            padding: 5px;
            opacity: 0;
            transition: opacity 0.3s, background 0.3s;
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .module-card:hover .manual-btn {
            opacity: 1;
        }
        .manual-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255,255,255,0.4);
        }
        .manual-btn img {
            width: 100%;
            height: 100%;
        }

        .empty-icon {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            color: rgba(60, 65, 75, 0.4);
            font-family: 'Cinzel', serif;
            background: repeating-linear-gradient(
                45deg,
                rgba(60, 65, 75, 0.05),
                rgba(60, 65, 75, 0.05) 10px,
                rgba(0, 0, 0, 0) 10px,
                rgba(0, 0, 0, 0) 20px
            );
            transition: color 0.3s, transform 0.3s;
        }

        .module-card:hover .add-icon-hover {
            color: var(--accent);
            transform: scale(1.15);
        }

        /* ─── 弹窗 ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: #0a0a0c;
            border: 1px solid var(--border);
            width: 460px;
            max-width: 92vw;
            padding: 36px 40px;
            transform: translateY(16px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.show .modal { transform: translateY(0); }

        .modal h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 28px;
            color: var(--accent);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-family: 'Cinzel', serif;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 14px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
        }
        .form-group input:focus,
        .form-group textarea:focus { border-color: var(--accent); }
        .form-group textarea { height: 80px; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
        }
        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 24px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-cancel:hover { border-color: var(--border-hover); color: var(--text-main); }
        .btn-confirm {
            background: var(--accent);
            border: none;
            color: #000;
            padding: 10px 28px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn-confirm:hover { background: #fbbf24; }
        .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

        .modal-error {
            font-size: 0.8rem;
            color: #ef4444;
            margin-top: 8px;
            min-height: 18px;
        }

        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .sys-info { text-align: left; }
            .module-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MAERS // ADMIN <a href="index.html" class="switch-btn" title="切换到访客模式">⇋ VISITOR</a></h1>
        <div class="sys-info">
            SYSTEM_STATUS: ONLINE (DEV_MODE)<br>
            DATETIME: SYNC_CONFIRMED
        </div>
    </header>

    <div class="module-grid" id="moduleGrid">
        <!-- 由 JS 从 /api/list-modules 动态填充 -->

        <!-- 添加模块按钮（始终在末尾）-->
        <div class="module-card" id="addModuleCard" style="cursor: pointer;" role="button" tabindex="0" title="添加新模块">
            <div class="card-cover">
                <div class="empty-icon add-icon-hover">+</div>
            </div>
            <div class="card-body">
                <div class="status-row">
                    <span class="status-offline">[ UNKNOW ]</span>
                    <span class="tag">---</span>
                </div>
                <h2>未知扇区</h2>
                <p>未知的实验性游戏模块</p>
                <div class="footer-row">
                    <span class="launch-btn" style="color:var(--text-muted)">Locked</span>
                    <span>Restricted</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加模块弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">// NEW MODULE</h3>
            <input type="hidden" id="editFilename">
            <div class="form-group">
                <label for="inputName">模块名称 *</label>
                <input type="text" id="inputName" placeholder="例：SQ-DU-II" maxlength="64" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="inputType">游戏类型</label>
                <input type="text" id="inputType" placeholder="例：回合制 / 实时对战 / 叙事" maxlength="32" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="inputDesc">简介</label>
                <textarea id="inputDesc" placeholder="一句话描述这个模块的内容…"></textarea>
            </div>
            <!-- 编辑模式下才显示的重命名选项 -->
            <div class="form-group" id="renameGroup" style="display:none;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="chkRename" style="accent-color:var(--accent);width:14px;height:14px;">
                    <span>同步重命名 HTML 文件（<span id="previewFilename" style="color:var(--accent)"></span>）</span>
                </label>
            </div>
            <div class="modal-error" id="modalError"></div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancel">取消</button>
                <button class="btn-confirm" id="btnConfirm">CREATE</button>
            </div>
        </div>
    </div>

    <!-- 独立说明书编辑弹窗 -->
    <div class="modal-overlay" id="manualOverlay">
        <div class="modal" style="width: 600px; max-width: 95%;">
            <h3 id="manualModalTitle">// MANUAL EDITOR</h3>
            <input type="hidden" id="manualFilename">
            <div class="form-group">
                <textarea id="inputManualText" rows="12" style="font-family: inherit; resize: vertical; width: 100%;" placeholder="在此编写游戏简介与游玩说明，支持多行..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelManual">关闭</button>
                <button class="btn-confirm" id="btnSaveManual">SAVE</button>
            </div>
        </div>
    </div>
</div>

<script src="/manage/index/toast.js"></script>
<script>
(function () {
    'use strict';

    const addCard      = document.getElementById('addModuleCard');
    const overlay      = document.getElementById('modalOverlay');
    const modalTitle   = document.getElementById('modalTitle');
    const btnCancel    = document.getElementById('btnCancel');
    const btnConfirm   = document.getElementById('btnConfirm');
    const inputName    = document.getElementById('inputName');
    const inputType    = document.getElementById('inputType');
    const inputDesc    = document.getElementById('inputDesc');
    const editFilename = document.getElementById('editFilename');
    const renameGroup  = document.getElementById('renameGroup');
    const chkRename    = document.getElementById('chkRename');
    const previewFile  = document.getElementById('previewFilename');
    const modalError   = document.getElementById('modalError');
    const moduleGrid   = document.getElementById('moduleGrid');

    const manualOverlay = document.getElementById('manualOverlay');
    const manualModalTitle = document.getElementById('manualModalTitle');
    const manualFilename = document.getElementById('manualFilename');
    const inputManualText = document.getElementById('inputManualText');
    const btnCancelManual = document.getElementById('btnCancelManual');
    const btnSaveManual = document.getElementById('btnSaveManual');

    // ── 页面加载：从注册表渲染所有模块 ──────────
    async function loadModules() {
        try {
            const res  = await fetch('/api/list-modules');
            const list = await res.json();
            list.forEach(m => {
                moduleGrid.insertBefore(buildModuleCard(m), addCard);
            });
        } catch (e) {
            console.warn('[MAERS] 无法连接服务器，注册表未加载。', e);
        }
    }
    loadModules();

    // ── 实时预览文件名 ────────────────────
    inputName.addEventListener('input', () => {
        if (renameGroup.style.display !== 'none') {
            const safe = inputName.value.trim().replace(/[^\w\u4e00-\u9fff\-]/g, '-');
            previewFile.textContent = safe ? safe + '.html' : '...';
        }
    });

    // ── 弹窗开关 ───────────────────────────────
    function openCreateModal() {
        editFilename.value  = '';
        inputName.value     = '';
        inputType.value     = '';
        inputDesc.value     = '';
        modalError.textContent = '';
        btnConfirm.textContent = 'CREATE';
        btnConfirm.disabled    = false;
        modalTitle.textContent = '// NEW MODULE';
        renameGroup.style.display = 'none';
        overlay.classList.add('show');
        setTimeout(() => inputName.focus(), 100);
    }

    function openEditModal(m) {
        editFilename.value  = m.filename;
        inputName.value     = m.name;
        inputType.value     = m.gameType || '';
        inputDesc.value     = m.description || '';
        modalError.textContent = '';
        btnConfirm.textContent = 'SAVE';
        btnConfirm.disabled    = false;
        modalTitle.textContent = '// EDIT MODULE';
        chkRename.checked      = false;
        const safe = m.name.replace(/[^\w\u4e00-\u9fff\-]/g, '-');
        previewFile.textContent = safe + '.html';
        renameGroup.style.display = '';
        overlay.classList.add('show');
        setTimeout(() => inputName.focus(), 100);
    }

    function closeModal() {
        overlay.classList.remove('show');
    }

    addCard.addEventListener('click', openCreateModal);
    addCard.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openCreateModal(); });
    btnCancel.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── 提交（创建 / 保存）──────────────────────
    btnConfirm.addEventListener('click', async () => {
        const name        = inputName.value.trim();
        const gameType    = inputType.value.trim();
        const description = inputDesc.value.trim();
        const filename    = editFilename.value;
        const isEdit      = !!filename;

        if (!name) {
            modalError.textContent = '模块名称不能为空。';
            inputName.focus();
            return;
        }

        btnConfirm.disabled    = true;
        btnConfirm.textContent = isEdit ? 'SAVING...' : 'CREATING...';
        modalError.textContent = '';

        try {
            let res, data;
            if (isEdit) {
                res  = await fetch('/api/update-module', {
                    method:  'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ filename, name, gameType, description, rename: chkRename.checked }),
                });
                data = await res.json();
                if (!res.ok) throw new Error(data.error);
                const oldCard = moduleGrid.querySelector(`[data-filename="${filename}"]`);
                if (oldCard) {
                    const newCard = buildModuleCard(data.module);
                    moduleGrid.insertBefore(newCard, oldCard);
                    oldCard.remove();
                }
                Toast.success(`${data.module.filename} 更新成功`);
            } else {
                res  = await fetch('/api/create-module', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ name, gameType, description }),
                });
                data = await res.json();
                if (!res.ok) throw new Error(data.error);
                moduleGrid.insertBefore(buildModuleCard(data.module), addCard);
                Toast.success(`${data.module.filename} 文件创建成功`);
            }
            closeModal();
        } catch (err) {
            modalError.textContent = err.message || '操作失败，请重试。';
            btnConfirm.disabled    = false;
            btnConfirm.textContent = isEdit ? 'SAVE' : 'CREATE';
        }
    });

    [inputName, inputType, inputDesc].forEach(el => {
        el.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) btnConfirm.click();
        });
    });

    // ── 说明书编辑逻辑 ────────────────────────
    function closeManualModal() {
        manualOverlay.classList.remove('show');
    }
    
    btnCancelManual.addEventListener('click', closeManualModal);
    manualOverlay.addEventListener('click', e => { if (e.target === manualOverlay) closeManualModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeManualModal(); });
    
    btnSaveManual.addEventListener('click', async () => {
        const fn = manualFilename.value;
        const text = inputManualText.value;
        
        btnSaveManual.disabled = true;
        btnSaveManual.textContent = 'SAVING...';
        
        try {
            const res = await fetch('/api/update-manual', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: fn, text: text })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            Toast.success('说明书已保存');
            closeManualModal();
        } catch (err) {
            Toast.error('保存失败：' + err.message);
        } finally {
            btnSaveManual.disabled = false;
            btnSaveManual.textContent = 'SAVE';
        }
    });

    // ── 删除 ──────────────────────────────────
    async function deleteModule(filename, cardEl) {
        if (!confirm(`确定删除模块 "${filename}"？\n\n此操作将同时删除对应的 HTML 文件，不可恢复。`)) return;
        try {
            const res  = await fetch('/api/delete-module', {
                method:  'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ filename }),
            });
            const data = await res.json();
            if (!res.ok) { Toast.error(data.error || '删除失败'); return; }
            cardEl.remove();
            Toast.success(`${filename} 删除成功`);
        } catch (e) {
            Toast.error('删除失败：' + e.message);
        }
    }

    // ── 构造卡片 DOM（统一入口）───────────────
    function buildModuleCard(m) {
        const isActive = m.status === 'active';
        const el = document.createElement('div');  // 始终用 div 包裹
        el.className = 'module-card';
        el.dataset.filename = m.filename;
        el.style.position = 'relative';

        const coverInner = m.cover
            ? `<img src="${esc(m.cover)}" alt="${esc(m.name)}"`
            + ` style="width:100%;height:100%;object-fit:cover;transition:transform 0.8s cubic-bezier(0.16,1,0.3,1);">`
            : `<div style="width:100%;height:100%;display:flex;justify-content:center;
                align-items:center;font-size:4rem;color:rgba(60,65,75,0.3);
                font-family:'Cinzel',serif;background:repeating-linear-gradient(
                45deg,rgba(60,65,75,0.05),rgba(60,65,75,0.05) 10px,
                rgba(0,0,0,0) 10px,rgba(0,0,0,0) 20px);">?</div>`;

        const statusLabel = isActive
            ? `<span class="status-active">[ ACTIVE ]</span>`
            : `<span class="status-offline">[ UNKNOW ]</span>`;

        const launchLabel = isActive
            ? `<span class="launch-btn">INITIATE &gt;</span>`
            : `<span class="launch-btn" style="color:var(--text-muted)">Locked</span>`;

        const footerRight = isActive ? 'ARCHIVE UNSEALED' : 'Restricted';

        const manualBtnHTML = isActive ? `
            <div class="manual-btn" title="编写简要说明">
                <img src="/ui/all/guide-book.svg" alt="edit manual">
            </div>
        ` : '';

        el.innerHTML = `
            ${manualBtnHTML}
            <div class="card-controls">
                <button class="ctrl-btn edit" title="编辑">✎</button>
                <button class="ctrl-btn del" title="删除">✕</button>
            </div>
            <div class="card-cover">${coverInner}</div>
            <div class="card-body">
                <div class="status-row">
                    ${statusLabel}
                    <span class="tag">${esc(m.gameType) || '---'}</span>
                </div>
                <h2>${esc(m.name)}</h2>
                <p>${esc(m.description) || '暂无简介'}</p>
                <div class="footer-row">
                    ${launchLabel}
                    <span>${footerRight}</span>
                </div>
            </div>`;

        // 点击卡片主体跳转（active 才跳）
        if (isActive) {
            el.style.cursor = 'pointer';
            el.addEventListener('click', e => {
                if (!e.target.closest('.ctrl-btn')) window.location.href = m.url;
            });
        }

        // 编辑按鈕
        el.querySelector('.ctrl-btn.edit').addEventListener('click', e => {
            e.stopPropagation();
            openEditModal(m);
            // 绑定返回的卡片到当前 el，方便更新后替换 DOM
        });

        // 删除按鈕
        el.querySelector('.ctrl-btn.del').addEventListener('click', e => {
            e.stopPropagation();
            deleteModule(m.filename, el);
        });

        // 编写简要说明按鈕
        const manBtn = el.querySelector('.manual-btn');
        if (manBtn) {
            manBtn.addEventListener('click', async (e) => {
                e.stopPropagation(); e.preventDefault();
                manualFilename.value = m.filename;
                manualModalTitle.textContent = `// MANUAL: ${m.name}`;
                inputManualText.value = 'Loading...';
                manualOverlay.classList.add('show');
                
                try {
                    const res = await fetch(`/api/get-manual?filename=${encodeURIComponent(m.filename)}`);
                    const data = await res.json();
                    inputManualText.value = res.ok ? (data.text || '') : '';
                } catch (err) {
                    inputManualText.value = '';
                }
            });
        }

        return el;
    }

    function esc(str) {
        return String(str ?? '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
}());
</script>

</body>
</html>
