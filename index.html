<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAERS PROTOCOL // MODULES</title>
    <link href="font/base/fonts.css" rel="stylesheet">
    <style>
        :root {
            /* 与 sq-du 战斗模块保持一致的色系 */
            --bg-base: #050505;
            --panel-bg: rgba(10, 10, 12, 0.85);
            --border: rgba(60, 65, 75, 0.6);
            --border-hover: rgba(150, 155, 165, 0.8);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent: #f59e0b;
            /* 炽黄色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 极简网格背景 */
            background-image:
                linear-gradient(rgba(60, 65, 75, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(60, 65, 75, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px;
        }

        header {
            margin-bottom: 60px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            font-weight: 500;
            color: #fff;
            display: flex;
            align-items: center;
        }

        .switch-btn {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: all 0.2s;
            font-family: 'Noto Sans SC', sans-serif;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .switch-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .sys-info {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            font-family: monospace;
            padding-bottom: 8px;
            line-height: 1.5;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 40px;
        }

        .module-card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        .module-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
        }

        /* 侧边强调线 */
        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--border);
            transition: 0.3s;
            z-index: 2;
        }

        .module-card:hover::before {
            background: var(--accent);
        }

        .card-cover {
            width: 100%;
            height: 220px;
            background: #000;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .module-card:hover .card-cover img {
            transform: scale(1.08);
        }

        .card-body {
            padding: 24px 30px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .status-active {
            color: var(--accent);
            font-weight: bold;
        }

        .status-offline {
            color: var(--text-muted);
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.75rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed var(--border);
            padding-top: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .launch-btn {
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .module-card:hover .launch-btn {
            color: var(--accent);
        }

        .empty-icon {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            color: rgba(60, 65, 75, 0.4);
            font-family: 'Cinzel', serif;
            background: repeating-linear-gradient(45deg,
                    rgba(60, 65, 75, 0.05),
                    rgba(60, 65, 75, 0.05) 10px,
                    rgba(0, 0, 0, 0) 10px,
                    rgba(0, 0, 0, 0) 20px);
        }

        .manual-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 32px;
            height: 32px;
            background: rgba(8, 8, 10, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            padding: 5px;
            opacity: 0;
            transition: opacity 0.3s, background 0.3s;
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(4px);
            pointer-events: auto;
            /* allow clicks if parent is pointer-events: none */
        }

        .module-card:hover .manual-btn {
            opacity: 1;
        }

        .manual-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .manual-btn img {
            width: 100%;
            height: 100%;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sys-info {
                text-align: left;
            }

            .module-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1 id="maersTitle" style="user-select:none;cursor:default;">MAERS // MODULES</h1>
            <div class="sys-info">
                SYSTEM_STATUS: ONLINE<br>
                DATETIME: SYNC_CONFIRMED
            </div>
        </header>

        <div class="module-grid" id="moduleGrid">
            <!-- 由 JS 从 /api/list-modules 动态填充 -->
        </div>
    </div>

    <script src="manage/index/brief.js"></script>
    <script>
        (function () {
            'use strict';

            const moduleGrid = document.getElementById('moduleGrid');

            // ── 从注册表渲染所有模块 ──────────────────────
            async function loadModules() {
                try {
                    // 直接拉取物理存放的静态 JSON，不再经过后端路由
                    const res = await fetch('data/index/modules.json');
                    if (!res.ok) throw new Error('fetch error');
                    const data = await res.json();
                    // modules.json 的结构是 { modules: [...] }
                    const list = data.modules || [];
                    list.forEach(m => moduleGrid.appendChild(buildModuleCard(m)));
                } catch (e) {
                    // 彻底拉取不到（极端情况网络错误）的兜底
                    moduleGrid.appendChild(buildOfflineCard('无法获取模块注册表，请检查网络或部署状态。'));
                }
                // 无论如何，末尾始终追加未知扇区占位卡
                moduleGrid.appendChild(buildUnknownCard());
            }

            // ── 未知扇区静态占位卡 ────────────────────────
            function buildUnknownCard() {
                const el = document.createElement('div');
                el.className = 'module-card';
                el.style.cssText = 'pointer-events:none;opacity:0.6;';
                el.innerHTML = `
            <div class="card-cover"><div class="empty-icon">?</div></div>
            <div class="card-body">
                <div class="status-row">
                    <span class="status-offline">[ UNKNOW ]</span>
                    <span class="tag">---</span>
                </div>
                <h2>未知扇区</h2>
                <p>未知的实验性游戏模块</p>
                <div class="footer-row">
                    <span class="launch-btn" style="color:var(--text-muted)">Locked</span>
                    <span>Restricted</span>
                </div>
            </div>`;
                return el;
            }

            // ── 服务器离线时的提示卡 ──────────────────────
            function buildOfflineCard(msg) {
                const el = document.createElement('div');
                el.className = 'module-card';
                el.style.cssText = 'pointer-events:none;opacity:0.4;';
                el.innerHTML = `
            <div class="card-cover"><div class="empty-icon">!</div></div>
            <div class="card-body">
                <div class="status-row">
                    <span class="status-offline">[ OFFLINE ]</span>
                    <span class="tag">---</span>
                </div>
                <h2>服务器未连接</h2>
                <p>${msg}</p>
                <div class="footer-row">
                    <span class="launch-btn" style="color:var(--text-muted)">Locked</span>
                    <span>Restricted</span>
                </div>
            </div>`;
                return el;
            }

            // ── 构造卡片 DOM ──────────────────────────────
            function buildModuleCard(m) {
                const isActive = m.status === 'active';
                const el = isActive ? document.createElement('a') : document.createElement('div');
                if (isActive) el.href = m.url;
                el.className = 'module-card';
                if (!isActive) el.style.cssText = 'pointer-events:none;opacity:0.6;';

                const coverInner = m.cover
                    ? `<img src="${esc(m.cover)}" alt="${esc(m.name)}">`
                    : `<div class="empty-icon">?</div>`;

                const statusLabel = isActive
                    ? `<span class="status-active">[ ACTIVE ]</span>`
                    : `<span class="status-offline">[ UNKNOW ]</span>`;

                const launchLabel = isActive
                    ? `<span class="launch-btn">INITIATE &gt;</span>`
                    : `<span class="launch-btn" style="color:var(--text-muted)">Locked</span>`;

                const footerRight = isActive ? 'ARCHIVE UNSEALED' : 'Restricted';

                const manualBtnHTML = isActive ? `
            <div class="manual-btn" title="查看说明书">
                <img src="ui-all/guide-book.svg" alt="manual">
            </div>
        ` : '';

                el.innerHTML = `
            ${manualBtnHTML}
            <div class="card-cover">${coverInner}</div>
            <div class="card-body">
                <div class="status-row">
                    ${statusLabel}
                    <span class="tag">${esc(m.gameType) || '---'}</span>
                </div>
                <h2>${esc(m.name)}</h2>
                <p>${esc(m.description) || '暂无简介'}</p>
                <div class="footer-row">
                    ${launchLabel}
                    <span>${footerRight}</span>
                </div>
            </div>`;

                // 绑定说明书按钮事件（静态读取 order.json，无需后端）
                const btn = el.querySelector('.manual-btn');
                if (btn) {
                    btn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        try {
                            const dir = m.filename.replace(/\.html$/, '');
                            const res = await fetch(`${dir}/manuals/order.json`);
                            const manuals = res.ok ? await res.json() : [];
                            BriefModal.show(m.name, m.filename, Array.isArray(manuals) ? manuals : []);
                        } catch (err) {
                            BriefModal.show(m.name, m.filename, []);
                        }
                    });
                }

                return el;
            }

            function esc(str) {
                return String(str ?? '')
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            loadModules();

            // ── 暗门：快速三连击标题进入后台 ──────────────
            let _ac = 0, _at = null;
            document.getElementById('maersTitle').addEventListener('click', () => {
                _ac++;
                if (_ac >= 3) { window.location.href = 'index-admin.html'; return; }
                clearTimeout(_at);
                _at = setTimeout(() => { _ac = 0; }, 600);
            });
        }());
    </script>

</body>

</html>
